services:
  db:
    image: postgres:15-alpine
    container_name: identify-voice-db
    env_file: .env.development
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-voice_db}
    ports:
      - "${DEV_DB_PORT:-5442}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: identify-voice-redis
    env_file: .env.development
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_123}
    ports:
      - "${REDIS_DB_PORT:-6382}:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-redis_password_123}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: identify-voice-api
    env_file: .env.development
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-voice_db}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_123}@redis:6379
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3000:3000"
    command: pnpm --filter @repo/api run start:dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
